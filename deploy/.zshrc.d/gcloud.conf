export CLOUDSDK_ROOT_DIR=/home/tin/.local/src/google-cloud-sdk

# The next line updates PATH for the Google Cloud SDK.
if [ -f "$CLOUDSDK_ROOT_DIR/path.zsh.inc" ]; then . "$CLOUDSDK_ROOT_DIR/path.zsh.inc"; fi

# The next line enables shell command completion for gcloud.
if [ -f "$CLOUDSDK_ROOT_DIR/completion.zsh.inc" ]; then . "$CLOUDSDK_ROOT_DIR/completion.zsh.inc"; fi

