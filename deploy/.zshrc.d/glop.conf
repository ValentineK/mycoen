# git log / changelog helpers
#
# glop               - list unpushed commits in changelog format
# glb [major|minor|patch]  - preview next changelog entry (default: minor)
# glcb [major|minor|patch] - bump version, prepend to CHANGELOG.md and commit (default: minor)
#                            blocked if unpushed changelog commit already exists
# glcu [major|minor|patch] - update existing unpushed changelog entry with new commits
#                            blocked if HEAD is already the changelog commit (nothing new)
#
# Functions
_git_log_next_version() {
    local bump="${1:-minor}"
    if [ ! -f CHANGELOG.md ]; then
        echo "CHANGELOG.md not found" >&2
        return 1
    fi

    local current_version=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^## //')
    if [ -z "$current_version" ]; then
        echo "Could not find version in CHANGELOG.md" >&2
        return 1
    fi

    local major minor patch
    IFS='.' read -r major minor patch <<< "$current_version"

    case "$bump" in
        major) major=$((major + 1)); minor=0; patch=0 ;;
        minor) minor=$((minor + 1)); patch=0 ;;
        patch) patch=$((patch + 1)) ;;
    esac

    echo "${major}.${minor}.${patch}"
}

_git_log_bump() {
    local version=$(_git_log_next_version "${1:-minor}") || return 1
    echo "## ${version}"
    glop
}

_git_log_commit_bump() {
    if _git_log_pretty | grep -q 'update changelog'; then
        echo "Unpushed changelog commit detected, push first" >&2
        return 1
    fi
    local version=$(_git_log_next_version "${1:-minor}") || return 1
    local changes=$(_git_log_pretty)
    local tmp=$(mktemp)
    { echo "## ${version}"; echo "${changes}"; echo; cat CHANGELOG.md; } > "$tmp" && mv "$tmp" CHANGELOG.md
    git add CHANGELOG.md && git commit -m "update changelog ${${PWD:t}} ${version}"
    awk '/^## /{count++; if(count==3) exit} {print}' CHANGELOG.md
}

_git_log_pretty() {
    local default_branch=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@')
    if [ -z "$default_branch" ]; then
        # Fallback: try to detect main vs master
        if git show-ref --verify --quiet refs/remotes/origin/main; then
            default_branch="main"
        elif git show-ref --verify --quiet refs/remotes/origin/master; then
            default_branch="master"
        else
            echo "Could not determine default branch" >&2
            return 1
        fi
    fi
    
    git log --oneline --no-decorate origin/${default_branch}..HEAD | \
        awk '{print "* ["substr($0, 9, 1000)"]""("substr($0, 0, 7)")" }'
}

_git_log_commit_update() {
    if ! _git_log_pretty | grep -q 'update changelog'; then
        echo "No unpushed changelog commit found" >&2
        return 1
    fi

    if [[ "$(git log -1 --format='%s')" == update\ changelog* ]]; then
        echo "Nothing to update, no new commits since last changelog" >&2
        return 1
    fi

    local current_version=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^## //')
    local changes=$(_git_log_pretty)
    local tmp=$(mktemp)
    { echo "## ${current_version}"; echo "${changes}"; echo; awk '/^## /{n++} n>=2{print}' CHANGELOG.md; } > "$tmp" && mv "$tmp" CHANGELOG.md
    git add CHANGELOG.md && git commit -m "update changelog ${${PWD:t}} ${current_version}"
    awk '/^## /{count++; if(count==3) exit} {print}' CHANGELOG.md
}

alias glb='_git_log_bump'
alias glcb='_git_log_commit_bump'
alias glcu='_git_log_commit_update'
alias glop='_git_log_pretty'

