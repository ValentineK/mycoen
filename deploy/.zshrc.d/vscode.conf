vscode-server() {
  docker run -d --rm --name vscode-server -p 9999:8080 \
    -v /home/tin/.vscode-server:/home/coder/.vscode-server \
    -v /home/tin/.local/share/code-server:/home/coder/.local/share/code-server \
    -v /home/tin/.config/code-server:/home/coder/.config/code-server \
    -v /home/tin/.local:/home/coder/.local \
    -v /home/tin/.claude:/home/coder/.claude \
    -v /home/tin/.claude.json:/home/coder/.claude.json \
    -v "$(pwd)":/home/coder/workspace \
    -e PUID=1000 -e PGID=1000 --user 1000:1000 \
    valentinek/vscode-server:4.104.2-bookworm \
    --bind-addr 0.0.0.0:8080 --auth none --disable-telemetry /home/coder/workspace
}

